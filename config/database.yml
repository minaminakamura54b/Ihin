default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DB_USERNAME") { ENV["USER"] } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "" } %>
  host: <%= ENV.fetch("DB_HOST") { "localhost" } %>

development:
  <<: *default
  database: ihin_development

test:
  <<: *default
  database: ihin_test

production:
  # DATABASE_URL 環境変数を直接使用（Render が connectionString を自動設定）
  url: <%= ENV["DATABASE_URL"] %>
